<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Cosmoss Audit Pro</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.5/dist/tesseract.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Syne:wght@700;800&display=swap');

  :root {
    --bg: #060608;
    --surface: #0f0f14;
    --surface2: #17171f;
    --border: #222230;
    --blue: #4f8eff;
    --yellow: #f5c842;
    --green: #3ddc84;
    --red: #ff4f6a;
    --text: #f0f0f8;
    --muted: #6e6e8a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    height: 100%;
    overflow: hidden; /* body doesn't scroll; inner panels do */
  }

  /* ── APP SHELL ── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 10;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 32px; height: 32px; border-radius: 8px;
    background: var(--blue); display: flex; align-items: center;
    justify-content: center; font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 16px;
  }
  .logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 16px; letter-spacing: -0.5px; }
  .status-pill {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface2); border: 1px solid var(--border);
    padding: 5px 12px; border-radius: 999px;
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
    color: var(--muted);
  }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #f5c842; animation: pulse 1.4s ease-in-out infinite; }
  .status-dot.green { background: var(--green); animation: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── CAMERA SECTION ── */
  #cam-section {
    position: relative;
    background: #000;
    overflow: hidden;
    flex-shrink: 0;
    transition: height 0.45s cubic-bezier(0.4,0,0.2,1);
    height: 44vw; /* barcode mode: slim */
  }
  #cam-section.expanded { height: 68vw; } /* text mode: bigger */

  #reader { width: 100%; height: 100%; }
  #reader video { width: 100% !important; height: 100% !important; object-fit: cover !important; }
  /* Hide default html5-qrcode UI noise */
  #reader img, #reader select, #reader button:not(#scanBtn) { display: none !important; }
  #reader__dashboard_section_swaplink, #reader__dashboard { display: none !important; }

  /* ── TARGET BOX ── */
  #scan-box {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 5;
    transition:
      width 0.45s cubic-bezier(0.4,0,0.2,1),
      height 0.45s cubic-bezier(0.4,0,0.2,1),
      border-color 0.3s ease,
      border-radius 0.45s ease;
    /* Barcode mode default */
    width: 78%;
    height: 72px;
    border: 2.5px solid var(--blue);
    border-radius: 10px;
    box-shadow:
      0 0 0 9999px rgba(0,0,0,0.68),
      inset 0 0 18px rgba(79,142,255,0.1);
  }
  #scan-box.text-mode {
    width: 94%;
    height: 82%;
    border-color: var(--yellow);
    border-radius: 20px;
    box-shadow:
      0 0 0 9999px rgba(0,0,0,0.55),
      inset 0 0 28px rgba(245,200,66,0.08);
  }
  #scan-box.success-mode {
    border-color: var(--green);
    border-radius: 20px;
    box-shadow:
      0 0 0 9999px rgba(0,0,0,0.55),
      inset 0 0 28px rgba(61,220,132,0.12),
      0 0 32px rgba(61,220,132,0.3);
  }

  /* Corner markers */
  #scan-box::before, #scan-box::after {
    content: '';
    position: absolute;
    width: 18px; height: 18px;
    border-color: inherit;
    border-style: solid;
  }
  #scan-box::before { top: -3px; left: -3px; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
  #scan-box::after { bottom: -3px; right: -3px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

  /* OCR spinner inside box */
  #ocr-spinner {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 32px; height: 32px;
    border: 3px solid rgba(245,200,66,0.2);
    border-top-color: var(--yellow);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
    display: none;
  }
  #ocr-spinner.visible { display: block; }
  @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

  /* ── INSTRUCTION BAR ── */
  #instruction-bar {
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .step-badge {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; padding: 3px 8px;
    font-size: 9px; font-weight: 700; text-transform: uppercase;
    color: var(--muted); white-space: nowrap;
  }
  #inst-main { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 800; }
  #inst-sub { font-size: 10px; color: var(--muted); margin-top: 1px; }

  /* ── SCROLL BODY ── */
  #scroll-body {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 14px 14px 80px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* ── RACK BAR ── */
  #rack-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 14px;
  }
  .rack-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 3px; }
  .rack-val { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800; }
  .rack-btn {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 8px 16px; border-radius: 10px;
    font-size: 11px; font-weight: 700; font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
  }
  .rack-btn:active { background: var(--blue); border-color: var(--blue); }

  /* ── LAST SCAN CARD ── */
  #last-scan-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 14px;
    display: none;
  }
  .card-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 6px; }
  .last-ean { font-size: 12px; color: var(--muted); }
  .last-batch { font-size: 18px; font-weight: 800; color: var(--green); margin: 2px 0; }
  .last-meta { font-size: 11px; color: var(--muted); }

  /* ── HIDDEN CANVAS ── */
  #hiddenCanvas { display: none; }

  /* ══════════════════════════════════════
     REVIEW MODAL (full screen scrollable)
     ══════════════════════════════════════ */
  #reviewModal {
    position: fixed; inset: 0; z-index: 100;
    background: var(--bg);
    display: none;
    flex-direction: column;
    overflow: hidden;
  }
  #reviewModal.open { display: flex; }

  .modal-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .modal-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; }
  .modal-close {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-size: 18px; display: flex;
    align-items: center; justify-content: center; cursor: pointer;
  }
  .modal-close:active { background: var(--red); }

  .modal-scroll {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 16px 16px 100px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .field-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 14px;
  }
  .field-label {
    font-size: 9px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--muted); font-weight: 700; margin-bottom: 6px;
  }
  .field-card .ean-val {
    font-size: 13px; color: #8888aa; word-break: break-all;
  }

  /* Inputs */
  input[type="text"], input[type="number"] {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 14px;
    font-size: 18px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 1px;
    text-transform: uppercase;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: var(--blue); }
  input.has-value { border-color: var(--green); }
  input::placeholder { color: var(--muted); font-size: 14px; font-weight: 400; }

  /* ── BATCH TAGS ── */
  #batchTagsWrap {
    display: flex; flex-wrap: wrap; gap: 7px; margin-top: 4px;
  }
  .batch-tag {
    background: var(--surface2); border: 1.5px solid var(--border);
    color: var(--blue); padding: 8px 12px; border-radius: 9px;
    font-size: 12px; font-weight: 700; cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  .batch-tag:active, .batch-tag.selected {
    background: var(--blue); border-color: var(--blue); color: #fff;
  }
  .no-batch { font-size: 11px; color: var(--red); font-weight: 700; }

  /* ── QTY SLIDER ── */
  .qty-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .qty-big { font-family: 'Syne', sans-serif; font-size: 40px; font-weight: 800; color: var(--blue); line-height: 1; }
  .qty-sub { font-size: 10px; color: var(--muted); }

  input[type=range] {
    -webkit-appearance: none; width: 100%;
    background: transparent; padding: 0;
    letter-spacing: 0; text-transform: none; font-size: 14px;
    border: none !important; outline: none !important;
    border-radius: 0 !important;
  }
  input[type=range]::-webkit-slider-runnable-track {
    height: 8px; background: var(--surface2); border-radius: 4px; border: 1px solid var(--border);
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 30px; height: 30px;
    border-radius: 50%; background: var(--blue);
    border: 2.5px solid #fff; margin-top: -11px; cursor: pointer;
  }

  /* ── DATE/SHELF ROW ── */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* ── SHELF CHIPS ── */
  .shelf-chips { display: flex; gap: 6px; margin-top: 8px; }
  .s-chip {
    flex: 1; text-align: center; padding: 9px 4px;
    background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 9px; font-size: 11px; font-weight: 700; cursor: pointer;
    color: var(--muted); transition: all 0.15s;
  }
  .s-chip:active, .s-chip.sel { background: var(--yellow); border-color: var(--yellow); color: #000; }

  /* ── MODAL FOOTER ── */
  .modal-footer {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; gap: 10px; padding: 12px 16px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    z-index: 101;
  }
  .btn-discard {
    flex: 0 0 80px; padding: 14px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); border-radius: 12px;
    font-size: 12px; font-weight: 700;
    font-family: 'JetBrains Mono', monospace; cursor: pointer;
  }
  .btn-discard:active { background: var(--red); border-color: var(--red); }
  .btn-save {
    flex: 1; padding: 14px;
    background: var(--blue); border: none;
    color: #fff; border-radius: 12px;
    font-size: 14px; font-weight: 800;
    font-family: 'Syne', sans-serif; cursor: pointer;
    box-shadow: 0 0 24px rgba(79,142,255,0.3);
  }
  .btn-save:active { background: #3a74e0; }

  /* ── LOCATION MODAL ── */
  #locModal {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.92);
    display: none; align-items: center; justify-content: center; padding: 20px;
  }
  #locModal.open { display: flex; }
  .loc-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 24px; width: 100%; max-width: 360px;
  }
  .loc-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; margin-bottom: 16px; }
  .loc-btns { display: flex; gap: 10px; margin-top: 20px; }
  .loc-cancel {
    flex: 0 0 80px; padding: 12px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: 10px;
    font-size: 12px; font-weight: 700;
    font-family: 'JetBrains Mono', monospace; cursor: pointer;
  }
  .loc-save {
    flex: 1; padding: 12px;
    background: var(--blue); border: none;
    color: #fff; border-radius: 10px;
    font-size: 13px; font-weight: 800;
    font-family: 'Syne', sans-serif; cursor: pointer;
  }

  /* ── OCR TOAST ── */
  #ocrToast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 10px 20px; border-radius: 999px;
    font-size: 12px; font-weight: 700;
    z-index: 300; opacity: 0; transition: opacity 0.25s;
    pointer-events: none; white-space: nowrap;
  }
  #ocrToast.show { opacity: 1; }
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-icon">C</div>
      <span class="logo-text">Audit Pro</span>
    </div>
    <div class="status-pill">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Loading AI</span>
    </div>
  </header>

  <!-- CAMERA -->
  <div id="cam-section">
    <div id="reader"></div>
    <div id="scan-box">
      <div id="ocr-spinner"></div>
    </div>
  </div>

  <!-- INSTRUCTION -->
  <div id="instruction-bar">
    <div>
      <div class="step-badge" id="stepBadge">Step 1</div>
    </div>
    <div>
      <div id="inst-main" style="color:var(--blue)">Scan Barcode</div>
      <div id="inst-sub">Hold barcode inside the blue box</div>
    </div>
  </div>

  <!-- SCROLL BODY -->
  <div id="scroll-body">
    <!-- RACK BAR -->
    <div id="rack-bar">
      <div>
        <div class="rack-label">Current Rack</div>
        <div class="rack-val" id="locDisplay">—</div>
      </div>
      <button class="rack-btn" onclick="openLocModal()">Change Rack</button>
    </div>

    <!-- LAST SCAN -->
    <div id="last-scan-card">
      <div class="card-label">Last Saved</div>
      <div class="last-ean" id="lastEan"></div>
      <div class="last-batch" id="lastBatch"></div>
      <div class="last-meta" id="lastMeta"></div>
    </div>
  </div>

  <canvas id="hiddenCanvas"></canvas>
</div>

<!-- REVIEW MODAL -->
<div id="reviewModal">
  <div class="modal-header">
    <div class="modal-title">Verify Data</div>
    <div class="modal-close" onclick="closeModal()">×</div>
  </div>
  <div class="modal-scroll">

    <!-- EAN -->
    <div class="field-card">
      <div class="field-label">EAN / Barcode</div>
      <div class="ean-val" id="modalEan"></div>
    </div>

    <!-- BATCH TAGS -->
    <div class="field-card">
      <div class="field-label">Master Batches — Tap to fill</div>
      <div id="batchTagsWrap"></div>
    </div>

    <!-- BATCH INPUT -->
    <div class="field-card">
      <div class="field-label">Batch Number</div>
      <input type="text" id="modalBatch" placeholder="Auto-detected / tap tag above" autocomplete="off" spellcheck="false">
    </div>

    <!-- MFG + SHELF -->
    <div class="two-col">
      <div class="field-card">
        <div class="field-label">MFG Date</div>
        <input type="text" id="modalMfg" placeholder="MM/YY" autocomplete="off" maxlength="5">
      </div>
      <div class="field-card">
        <div class="field-label">Shelf (Months)</div>
        <input type="number" id="modalShelf" placeholder="e.g. 24" min="1" max="72">
      </div>
    </div>

    <!-- SHELF CHIPS -->
    <div class="field-card">
      <div class="field-label">Quick Shelf Life</div>
      <div class="shelf-chips">
        <div class="s-chip" onclick="setShelf(12,this)">12M</div>
        <div class="s-chip" onclick="setShelf(18,this)">18M</div>
        <div class="s-chip" onclick="setShelf(24,this)">24M</div>
        <div class="s-chip" onclick="setShelf(30,this)">30M</div>
        <div class="s-chip" onclick="setShelf(36,this)">36M</div>
      </div>
    </div>

    <!-- QUANTITY SLIDER 1-250 -->
    <div class="field-card">
      <div class="qty-row">
        <div>
          <div class="field-label">Quantity</div>
          <div class="qty-sub">Drag slider ← →</div>
        </div>
        <div class="qty-big" id="qtyDisplay">1</div>
      </div>
      <input type="range" id="qtySlider" min="1" max="250" value="1"
        oninput="document.getElementById('qtyDisplay').textContent=this.value">
    </div>

  </div>
  <div class="modal-footer">
    <button class="btn-discard" onclick="closeModal()">Discard</button>
    <button class="btn-save" onclick="doSave()">Save to Sheet ↗</button>
  </div>
</div>

<!-- LOCATION MODAL -->
<div id="locModal">
  <div class="loc-box">
    <div class="loc-title">Set Rack Location</div>
    <input type="text" id="locInput" placeholder="e.g. RACK-A1" style="text-transform:uppercase">
    <div class="loc-btns">
      <button class="loc-cancel" onclick="closeLocModal()">Cancel</button>
      <button class="loc-save" onclick="saveLocation()">Save</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="ocrToast">Scanning label...</div>

<script>
// ═══════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════
const GAS_URL = "https://script.google.com/macros/s/AKfycbz7_o-eUjrOZNT7_3DhJrh_2ephhVw98o5VSHbw3LADpJ17yM7-b8j9kdjXZj2qUNLr/exec";

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let tesseractWorker = null;
let html5QrCode = null;
let batchMaster = {};
let globalLocation = localStorage.getItem('rack_loc_v5') || "RACK-1";
let scanning = false;       // currently hunting barcode
let huntingText = false;    // currently hunting label text
let activeEAN = null;

const vib = (p) => { try { navigator.vibrate && navigator.vibrate(p); } catch(e){} };

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
async function init() {
  document.getElementById('locDisplay').textContent = globalLocation;
  setUI("Step 1","Scan Barcode","Hold EAN barcode in the blue box","var(--blue)");

  // ── Init Tesseract (guarded — CDN may be slow on first load)
  if (typeof Tesseract !== 'undefined') {
    try {
      setStatus('Loading AI...');
      tesseractWorker = await Tesseract.createWorker('eng', 1, {
        workerPath: 'https://cdn.jsdelivr.net/npm/tesseract.js@5.0.5/dist/worker.min.js',
        langPath: 'https://tessdata.projectnaptha.com/4.0.0',
        corePath: 'https://cdn.jsdelivr.net/npm/tesseract.js-core@5.0.0/tesseract-core-simd-lstm.wasm.js',
        logger: m => {
          if (m.status === 'downloading eng.traineddata')
            setStatus('OCR ' + Math.round(m.progress * 100) + '%');
          if (m.status === 'initialized api')
            setStatus('AI Ready');
        }
      });
      await tesseractWorker.setParameters({
        tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789/.-: ',
        preserve_interword_spaces: '1',
      });
      setStatus('AI Ready');
    } catch(e) {
      console.warn("Tesseract init failed:", e);
      tesseractWorker = null;
      setStatus('No OCR');
    }
  } else {
    console.warn("Tesseract not loaded");
    setStatus('No OCR');
  }

  // ── Load batch master non-blocking
  loadBatchMaster();

  // ── Always start camera
  startCamera();
}

async function loadBatchMaster() {
  try {
    const controller = new AbortController();
    setTimeout(() => controller.abort(), 8000);
    const res = await fetch(GAS_URL, { redirect: 'follow', signal: controller.signal });
    const json = JSON.parse(await res.text());
    batchMaster = json.batchMaster || {};
    setStatus('Ready');
    setStatusDot(true);
  } catch(e) {
    setStatus('Offline');
  }
}

function setStatus(t) { document.getElementById('statusText').textContent = t; }
function setStatusDot(green) {
  const d = document.getElementById('statusDot');
  d.className = 'status-dot' + (green ? ' green' : '');
}

// ═══════════════════════════════════════════════
// CAMERA (high-res, continuous focus)
// ═══════════════════════════════════════════════
function startCamera() {
  html5QrCode = new Html5Qrcode("reader", { verbose: false });
  const config = {
    fps: 12,
    qrbox: { width: Math.floor(window.innerWidth * 0.76), height: 68 },
    aspectRatio: window.innerWidth / (window.innerWidth * 0.44),
    videoConstraints: {
      facingMode: { exact: "environment" },
      width: { ideal: 3840, min: 1280 },
      height: { ideal: 2160, min: 720 },
      advanced: [
        { focusMode: "continuous" },
        { torch: false }
      ]
    }
  };

  html5QrCode.start(
    { facingMode: { ideal: "environment" } },
    config,
    (decodedText) => {
      if (!huntingText) startTextHunt(decodedText);
    },
    () => {} // ignore frame errors
  ).catch(e => {
    // fallback without exact constraint
    html5QrCode.start(
      { facingMode: "environment" },
      { ...config, videoConstraints: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } } },
      (decodedText) => { if (!huntingText) startTextHunt(decodedText); },
      () => {}
    );
  });
}

// ═══════════════════════════════════════════════
// PHASE 1 → PHASE 2 TRANSITION
// ═══════════════════════════════════════════════
function startTextHunt(ean) {
  huntingText = true;
  activeEAN = ean;
  vib([80]);

  // Expand camera & box
  document.getElementById('cam-section').classList.add('expanded');
  const box = document.getElementById('scan-box');
  box.className = 'text-mode';

  document.getElementById('ocr-spinner').classList.add('visible');
  setUI("Step 2","Scan Label","Point at batch/date label — hold steady","var(--yellow)");
  showToast("EAN captured — now scan the label");

  huntLoop();
}

// ═══════════════════════════════════════════════
// HUNT LOOP — multi-attempt OCR with smart parse
// ═══════════════════════════════════════════════
async function huntLoop() {
  const MAX_ATTEMPTS = 10; // up to ~10 captures
  const DELAY_MS = 600;    // 600ms between frames
  let bestResult = { batch: '', mfg: '', shelf: '' };
  let bestScore = 0;

  for (let i = 0; i < MAX_ATTEMPTS && huntingText; i++) {
    await sleep(i === 0 ? 800 : DELAY_MS); // wait a bit on first for camera to focus
    if (!huntingText) break;

    const raw = captureFrame();
    if (!raw) continue;

    // Run OCR on multiple crops for coverage
    const results = [];
    if (tesseractWorker) {
      // Full frame
      const r1 = await ocrCanvas(raw.canvas, raw.ctx, raw.vw, raw.vh, 0, 0, raw.vw, raw.vh);
      results.push(r1);
      // Top half (batch usually first)
      const r2 = await ocrCanvas(raw.canvas, raw.ctx, raw.vw, raw.vh, 0, 0, raw.vw, raw.vh * 0.55);
      results.push(r2);
      // Bottom half
      const r3 = await ocrCanvas(raw.canvas, raw.ctx, raw.vw, raw.vh, 0, raw.vh * 0.45, raw.vw, raw.vh * 0.55);
      results.push(r3);
    }

    // Merge best from all crops
    for (const txt of results) {
      if (!txt) continue;
      const parsed = parse(txt);
      const score = (parsed.batch ? 3 : 0) + (parsed.mfg ? 2 : 0) + (parsed.shelf ? 1 : 0);
      if (score > bestScore) {
        bestScore = score;
        bestResult = { ...bestResult, ...filterEmpty(parsed) };
      }
    }

    // Update toast
    showToast(`Scan ${i+1}/${MAX_ATTEMPTS} — ${scoreLabel(bestScore)}`);

    // If we got all 3, stop early (score 6 = all found)
    if (bestScore >= 6) {
      showToast("Got all 3! ✓");
      await sleep(300);
      break;
    }
  }

  // Done hunting
  huntingText = false;
  document.getElementById('ocr-spinner').classList.remove('visible');

  if (bestScore > 0) {
    // Flash green box
    document.getElementById('scan-box').className = 'success-mode';
    vib([50,60,80]);
    await sleep(400);
  }

  openReviewModal(activeEAN, bestResult.batch, bestResult.mfg, bestResult.shelf);
}

function filterEmpty(o) {
  return Object.fromEntries(Object.entries(o).filter(([,v]) => v && v.length > 0));
}

function scoreLabel(s) {
  if (s >= 6) return "All found ✓";
  if (s >= 5) return "Batch + MFG ✓";
  if (s >= 3) return "Batch found";
  if (s >= 2) return "MFG found";
  return "Searching...";
}

function captureFrame() {
  const video = document.querySelector("#reader video");
  if (!video || !video.videoWidth) return null;
  const canvas = document.getElementById('hiddenCanvas');
  const ctx = canvas.getContext('2d');
  const vw = video.videoWidth, vh = video.videoHeight;
  canvas.width = vw; canvas.height = vh;
  ctx.drawImage(video, 0, 0, vw, vh);
  return { canvas, ctx, vw, vh };
}

async function ocrCanvas(srcCanvas, ctx, vw, vh, sx, sy, sw, sh) {
  if (!tesseractWorker) return "";
  try {
    const tmp = document.createElement('canvas');
    tmp.width = sw; tmp.height = sh;
    const tCtx = tmp.getContext('2d');
    // Contrast + sharpness enhancement
    tCtx.filter = 'contrast(1.35) brightness(1.1)';
    tCtx.drawImage(srcCanvas, sx, sy, sw, sh, 0, 0, sw, sh);
    const { data: { text } } = await tesseractWorker.recognize(tmp);
    return text;
  } catch(e) { return ""; }
}

// ═══════════════════════════════════════════════
// PARSER — extracts batch, mfg, shelf
// ═══════════════════════════════════════════════
function parse(rawText) {
  // Normalise
  let text = rawText.toUpperCase()
    // OCR common confusions
    .replace(/\bO\b/g, '0')
    .replace(/\bl\b/g, '1')
    .replace(/\bI\b(?=\d)/g, '1')
    .replace(/\bG\b(?=\d)/g, '6')
    .replace(/\bS\b(?=\d)/g, '5')
    .replace(/[\u2019\u2018`]/g, '')
    // Normalise separators
    .replace(/(\d{2})[.\-](\d{2})[.\-](\d{2,4})/g, '$1/$2/$3');

  const lines = text.split(/\n/).map(l => l.trim()).filter(Boolean);

  // ── 1. FIND ALL DATES ──
  // Accepts: MM/YY, MM/YYYY, M/YY, M/YYYY (with . or - too)
  const DATE_RE = /\b(0?[1-9]|1[0-2])[\/\.\-](20(2[1-9]|3[0-9])|2[1-9])\b/g;
  let allDates = [];
  for (const line of lines) {
    let m;
    while ((m = DATE_RE.exec(line)) !== null) {
      const mStr = m[1].padStart(2,'0');
      const yStr = m[2].length === 2 ? '20' + m[2] : m[2];
      const yShort = yStr.slice(-2);
      allDates.push({
        full: `${mStr}/${yShort}`,
        m: parseInt(mStr), y: parseInt(yStr),
        lineIdx: lines.indexOf(line),
        charIdx: m.index
      });
    }
    DATE_RE.lastIndex = 0;
  }
  // Remove duplicates and sort chronologically
  allDates = uniqueDates(allDates);
  allDates.sort((a, b) => a.y !== b.y ? a.y - b.y : a.m - b.m);

  const mfg = allDates.length > 0 ? allDates[0].full : '';

  // ── 2. SHELF LIFE ──
  let shelf = '';
  // Explicit: "24M", "24 MONTHS", "24MOS"
  const shelfRe = /\b(\d{2})\s*(?:MONTHS?|MOS?|M\b)/;
  const shelfMatch = text.match(shelfRe);
  if (shelfMatch) {
    const sv = parseInt(shelfMatch[1]);
    if (sv >= 6 && sv <= 72) shelf = sv.toString();
  }
  // Derived from 2 dates
  if (!shelf && allDates.length >= 2) {
    const d0 = allDates[0], d1 = allDates[1];
    const diff = (d1.y - d0.y) * 12 + (d1.m - d0.m);
    // Only accept sensible shelf life 6–60 months
    if (diff >= 6 && diff <= 60) shelf = diff.toString();
  }

  // ── 3. BATCH NUMBER ──
  let batch = '';

  // Known batches from master
  const validBatches = batchMaster[activeEAN] || [];
  let bestFuzzy = { batch: '', sim: 0 };

  const pureText = text.replace(/[^A-Z0-9]/g, '');

  for (const vb of validBatches) {
    const pureVb = vb.replace(/[^A-Z0-9]/g, '').toUpperCase();
    if (pureVb.length < 3) continue;
    // Exact substring
    if (pureText.includes(pureVb)) { batch = vb; break; }
    // Fuzzy match (handles I/1, V/U, G/6, S/5)
    const sim = fuzzyBatchSim(pureText, pureVb);
    if (sim > bestFuzzy.sim) bestFuzzy = { batch: vb, sim };
  }

  if (!batch && bestFuzzy.sim >= 0.70) batch = bestFuzzy.batch;

  // If still no batch from master, heuristic:
  if (!batch) {
    batch = heuristicBatch(lines, allDates);
  }

  return { batch, mfg, shelf };
}

// Fuzzy similarity for batch matching (handles OCR confusions)
function fuzzyBatchSim(haystack, needle) {
  // OCR normalise both
  const norm = s => s
    .replace(/[I1]/g,'1')
    .replace(/[VU]/g,'V')
    .replace(/[G6]/g,'6')
    .replace(/[S5]/g,'5')
    .replace(/[O0]/g,'0')
    .replace(/[B8]/g,'8');
  const h = norm(haystack), n = norm(needle);
  if (h.includes(n)) return 1.0;
  // Sliding window similarity
  let best = 0;
  for (let i = 0; i <= h.length - n.length; i++) {
    let matches = 0;
    for (let j = 0; j < n.length; j++) {
      if (h[i+j] === n[j]) matches++;
    }
    best = Math.max(best, matches / n.length);
  }
  return best;
}

// Heuristic: batch is often on its own line before the MFG date line
function heuristicBatch(lines, dates) {
  if (dates.length === 0) {
    // No date anchor. Try to find alphanumeric line 5-12 chars
    for (const line of lines) {
      const clean = line.replace(/[^A-Z0-9]/g,'');
      if (clean.length >= 5 && clean.length <= 12 && /[A-Z]/.test(clean) && /[0-9]/.test(clean)) {
        return clean;
      }
    }
    return '';
  }

  // Find the line containing first date
  const firstDateLine = dates[0].lineIdx;
  // Look at lines before it
  for (let i = firstDateLine - 1; i >= Math.max(0, firstDateLine - 3); i--) {
    const clean = lines[i].replace(/[^A-Z0-9]/g,'');
    if (clean.length >= 4 && clean.length <= 14) {
      // Must have at least one letter and one digit for typical batch format
      if (/[A-Z]/.test(clean) && /[0-9]/.test(clean)) return clean;
    }
  }

  // Try splitting first date line
  const dLine = lines[firstDateLine] || '';
  const parts = dLine.split(/\s+/).filter(p => p.length >= 4);
  for (const p of parts) {
    const c = p.replace(/[^A-Z0-9]/g,'');
    if (c.length >= 4 && c.length <= 12 && /[A-Z]/.test(c) && /[0-9]/.test(c)) {
      if (!c.match(/^\d{2}\/\d{2}/)) return c; // skip if it looks like a date
    }
  }

  return '';
}

function uniqueDates(dates) {
  const seen = new Set();
  return dates.filter(d => {
    if (seen.has(d.full)) return false;
    seen.add(d.full); return true;
  });
}

// ═══════════════════════════════════════════════
// REVIEW MODAL
// ═══════════════════════════════════════════════
function openReviewModal(ean, batch, mfg, shelf) {
  document.getElementById('modalEan').textContent = ean;
  document.getElementById('modalBatch').value = batch || '';
  document.getElementById('modalMfg').value = mfg || '';
  document.getElementById('modalShelf').value = shelf || '';
  document.getElementById('qtySlider').value = 1;
  document.getElementById('qtyDisplay').textContent = '1';

  // Colour fill indicators
  ['modalBatch','modalMfg','modalShelf'].forEach(id => {
    const el = document.getElementById(id);
    el.classList.toggle('has-value', el.value.length > 0);
  });

  // Build batch tags
  const tags = batchMaster[ean] || [];
  const wrap = document.getElementById('batchTagsWrap');
  if (tags.length > 0) {
    wrap.innerHTML = tags.map(t =>
      `<div class="batch-tag" onclick="selectBatchTag(this,'${t}')">${t}</div>`
    ).join('');
    // Auto-highlight detected batch
    if (batch) {
      wrap.querySelectorAll('.batch-tag').forEach(el => {
        if (el.textContent === batch) el.classList.add('selected');
      });
    }
  } else {
    wrap.innerHTML = `<span class="no-batch">No master batches in database</span>`;
  }

  // Reset shelf chips
  document.querySelectorAll('.s-chip').forEach(c => c.classList.remove('sel'));
  if (shelf) {
    document.querySelectorAll('.s-chip').forEach(c => {
      if (c.textContent === shelf + 'M') c.classList.add('sel');
    });
  }

  document.getElementById('reviewModal').classList.add('open');
  document.getElementById('reviewModal').querySelector('.modal-scroll').scrollTop = 0;
}

function selectBatchTag(el, val) {
  document.querySelectorAll('.batch-tag').forEach(t => t.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('modalBatch').value = val;
  document.getElementById('modalBatch').classList.add('has-value');
}

function setShelf(val, el) {
  document.querySelectorAll('.s-chip').forEach(c => c.classList.remove('sel'));
  el.classList.add('sel');
  document.getElementById('modalShelf').value = val;
  document.getElementById('modalShelf').classList.add('has-value');
}

function closeModal() {
  document.getElementById('reviewModal').classList.remove('open');
  resetScanner();
}

function doSave() {
  const ean = document.getElementById('modalEan').textContent;
  const batch = document.getElementById('modalBatch').value.trim().toUpperCase();
  const mfg = document.getElementById('modalMfg').value.trim();
  const shelf = document.getElementById('modalShelf').value.trim();
  const qty = parseInt(document.getElementById('qtySlider').value) || 1;

  document.getElementById('reviewModal').classList.remove('open');

  // Show last scan
  document.getElementById('lastEan').textContent = ean;
  document.getElementById('lastBatch').textContent = batch || '(no batch)';
  document.getElementById('lastMeta').textContent = `MFG: ${mfg || '—'} | Shelf: ${shelf || '—'}M | Qty: ${qty} | ${globalLocation}`;
  document.getElementById('last-scan-card').style.display = 'block';

  // Push to sheet
  fetch(GAS_URL, {
    method: 'POST', mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ location: globalLocation, ean, batch, mfg, shelfLife: shelf, qty })
  });

  vib([60, 80, 60]);
  showToast("Saved ✓");
  resetScanner();
}

function resetScanner() {
  huntingText = false;
  activeEAN = null;
  document.getElementById('cam-section').classList.remove('expanded');
  document.getElementById('scan-box').className = '';
  document.getElementById('ocr-spinner').classList.remove('visible');
  setUI("Step 1","Scan Barcode","Hold EAN barcode in the blue box","var(--blue)");
}

// ═══════════════════════════════════════════════
// LOCATION MODAL
// ═══════════════════════════════════════════════
function openLocModal() {
  document.getElementById('locInput').value = globalLocation;
  document.getElementById('locModal').classList.add('open');
  setTimeout(() => document.getElementById('locInput').focus(), 100);
}
function closeLocModal() { document.getElementById('locModal').classList.remove('open'); }
function saveLocation() {
  const v = (document.getElementById('locInput').value || '').trim().toUpperCase();
  if (v) {
    globalLocation = v;
    localStorage.setItem('rack_loc_v5', v);
    document.getElementById('locDisplay').textContent = v;
  }
  closeLocModal();
}

// ═══════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════
function setUI(step, main, sub, color) {
  document.getElementById('stepBadge').textContent = step;
  const m = document.getElementById('inst-main');
  m.textContent = main;
  m.style.color = color;
  document.getElementById('inst-sub').textContent = sub;
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('ocrToast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ═══════════════════════════════════════════════
// INPUT LIVE HIGHLIGHTING
// ═══════════════════════════════════════════════
['modalBatch','modalMfg','modalShelf'].forEach(id => {
  document.getElementById(id).addEventListener('input', function() {
    this.classList.toggle('has-value', this.value.length > 0);
  });
});

// ═══════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════
window.addEventListener('load', init);
</script>
